version: 0.1
name: ShipKit Evidence Layer

purpose: >
  Store factual outputs from external tools and internal checks so agents can reason from artifacts, not chat memory.

root: evidence/

folders:
  reverse-prd: evidence/reverse-prd/
  codegraph: evidence/codegraph/
  impact: evidence/impact/
  spec: evidence/spec/
  security: evidence/security/
  testing: evidence/testing/
  release: evidence/release/
  vendor: evidence/vendor/

rules:
  - every_external_tool_run_must_write_an_evidence_file
  - evidence_must_record_tool_name_version_inputs_and_timestamp
  - inferred_evidence_must_not_be_treated_as_confirmed_scope
  - evidence_used_for_release_must_have_gate_result
  - client_facing_evidence_requires_audit

minimum_evidence_record:
  fields:
    - tool
    - version
    - stage
    - input_paths
    - output_paths
    - summary
    - confidence
    - limitations
    - next_gate
