policy:
  facts:
    source_of_truth: project_files
    chat_history_is_not_source_of_truth: true

  requirements:
    unclear_requirement_requires_clarification: true
    new_requirement_requires_change_flow: true
    bug_requires_requirement_trace: true
    refactor_requires_impact_analysis: true
    key_decision_requires_adr: true

  delivery:
    external_docs_require_redaction_audit: true
    delivery_requires_acceptance_matrix: true
    release_requires_rollback_plan: true
    release_requires_env_readiness: true
    release_requires_security_baseline: true

  client_facing_redlines:
    forbidden_terms:
      - man-day
      - daily rate
      - buffer
      - internal cost
      - margin
      - quick fix
      - simple change
      - free
      - just add
      - should be easy

  issue_defaults:
    clarification_sla_hours: 48
    blocker_escalation_hours: 24
    blocker_plan_adjustment_hours: 72
    debt_delivery_threshold: D1
