version: 1
purpose: Evaluate third-party repositories before they affect ShipKit core, skills, tools, runners, or project status.

required_checks:
  identity:
    - repository_exists
    - canonical_url_recorded
    - owner_recorded
    - description_recorded
  license:
    - license_detected
    - commercial_use_allowed
    - redistribution_allowed
    - attribution_required_recorded
  supply_chain:
    - install_scripts_reviewed
    - postinstall_scripts_reviewed
    - binary_downloads_reviewed
    - network_calls_reviewed
    - invisible_unicode_scan
    - secret_scan
  fit:
    - shipkit_layer_identified
    - integration_mode_identified
    - overlap_with_shipkit_recorded
    - output_artifacts_defined
  governance:
    - human_approval_required_for_risky_actions
    - tool_policy_mapping_defined
    - gate_mapping_defined
    - evidence_contract_defined

decisions:
  - accept_as_evidence_adapter
  - accept_as_runner_candidate
  - accept_as_reference_only
  - rewrite_as_internal_skill
  - reject
  - needs_human_review

risk_levels:
  low:
    description: Static reference or low-risk local-only tool with permissive license.
  medium:
    description: Executable tool, runner, or skill with filesystem or shell access.
  high:
    description: Tool requiring broad permissions, network access, secrets, deployment, or production access.

policy:
  default_decision: needs_human_review
  direct_vendor_to_core: forbidden
  third_party_runner_default: forbidden
  copy_skill_verbatim: discouraged
  evidence_first: required
