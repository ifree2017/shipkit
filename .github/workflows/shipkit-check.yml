name: ShipKit Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  shipkit-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run ShipKit gates when available
        run: |
          if [ -f gates/check-traceability.js ]; then node gates/check-traceability.js .; fi
          if [ -f gates/check-quality-scorecard.js ]; then node gates/check-quality-scorecard.js .; fi
          if [ -f gates/check-agent-legibility.js ]; then node gates/check-agent-legibility.js .; fi
