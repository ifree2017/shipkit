name: Release Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: node --check bin/sk.js
      - name: Package checks
        run: |
          node bin/sk.js check --to .
          node bin/sk.js check release-check --to .
      - name: Example smoke test
        run: |
          node bin/sk.js new demo --to /tmp/shipkit-demo --profile standard-team
          node bin/sk.js check --project /tmp/shipkit-demo
      - name: npm pack dry run
        run: npm pack --dry-run
